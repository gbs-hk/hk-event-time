name: Build and deploy Python app to Azure Web App - hk-event-time

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: hk-event-time
  AZURE_WEBAPP_PACKAGE_PATH: deploy.zip
  AZURE_RESOURCE_GROUP: hk-event-time

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Vendor Python dependencies for App Service
        run: |
          python -m pip install --upgrade pip
          rm -rf .python_packages
          mkdir -p .python_packages/lib/site-packages
          python -m pip install -r requirements.txt --target .python_packages/lib/site-packages

      - name: Assemble deploy artifact
        run: |
          rm -f deploy.zip
          zip -qr deploy.zip app templates static .python_packages run.py wsgi.py requirements.txt runtime.txt

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BFC869CB135A43B792809933289B5DB6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_789568E06C504C2D96EC902D5C8BE96E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6B5E670E6A01432AAE0623C233C02FAF }}

      - name: Deploy prepared artifact to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Configure Azure app settings after deploy
        run: |
          az webapp config appsettings set \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --settings DATABASE_URL=sqlite:////home/site/wwwroot/events.db FLASK_ENV=production USE_RELOADER=0

      - name: Configure startup command after deploy
        run: |
          az webapp config set \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --linux-fx-version "PYTHON|3.10" \
            --startup-file "bash -c \"export PYTHONPATH=/home/site/wwwroot/.python_packages/lib/site-packages:\$PYTHONPATH && exec python -m gunicorn --chdir /home/site/wwwroot --bind=0.0.0.0 --workers 1 --threads 4 --timeout 600 wsgi:app\""

      - name: Wait for app restart to settle
        run: sleep 45
