name: Build and deploy Python app to Azure Web App - hk-event-time

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: hk-event-time
  AZURE_WEBAPP_PACKAGE_PATH: deploy.zip
  AZURE_RESOURCE_GROUP: hk-event-time

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend static export
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend
          rm -rf backend/app/frontend_out
          cp -R frontend/out backend/app/frontend_out

      - name: Verify exported frontend assets
        run: python3 backend/scripts/verify_frontend_export.py backend/app/frontend_out

      - name: Assemble deploy artifact
        run: |
          rm -f deploy.zip
          cd backend
          zip -qr ../deploy.zip .

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BFC869CB135A43B792809933289B5DB6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_789568E06C504C2D96EC902D5C8BE96E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6B5E670E6A01432AAE0623C233C02FAF }}

      - name: Configure Azure Web App deployment settings
        run: |
          az webapp config appsettings set \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false DATABASE_URL=sqlite:////home/site/wwwroot/hk_events.db
          az webapp config set \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --linux-fx-version "PYTHON|3.10"

      - name: Deploy prepared artifact to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Configure FastAPI startup command
        run: |
          az webapp config set \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --startup-file "bash -c \"pip install -r /home/site/wwwroot/requirements.txt && python /home/site/wwwroot/scripts/init_db.py && exec gunicorn --chdir /home/site/wwwroot --bind=0.0.0.0 --timeout 600 --worker-class uvicorn.workers.UvicornWorker app.main:app\""
